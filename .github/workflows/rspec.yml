name: RSpec

on:
  push:

jobs:
  rspec:
    name: rspec (ruby ${{ matrix.ruby-version }})
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ["3.3", "3.4", "4.0"]

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Prepare per-user Nix gcroots
        shell: bash
        run: |
          set -euo pipefail

          user="$(id -un)"
          group="$(id -gn)"
          gcroot_dir="/nix/var/nix/gcroots/per-user/${user}"

          sudo mkdir -p "$gcroot_dir"
          sudo chown "${user}:${group}" "$gcroot_dir"

      - name: Set up Nix test dependencies
        shell: bash
        run: |
          set -euo pipefail

          nix profile install --accept-flake-config nixpkgs#nix-prefetch-git

          nixpkgs_path="$(
            nix eval --raw --impure \
              --extra-experimental-features 'nix-command flakes' \
              --expr '(let f = builtins.getFlake (toString ./.); in f.inputs.nixpkgs.outPath)'
          )"

          echo "CONFCTL_TEST_NIXPKGS=${nixpkgs_path}" >>"$GITHUB_ENV"
          echo "NIX_PATH=nixpkgs=${nixpkgs_path}" >>"$GITHUB_ENV"

      - name: Set up Ruby + Bundler cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Run RSpec
        shell: bash
        run: |
          bundle exec rspec
